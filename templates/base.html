<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA | {% block title %}Smart Parking{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/style.css?v=2.0.1">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-parking"></i></div>
                <div class="logo-text">ALPHA<span>PARKING</span></div>
            </div>
            <div class="project-title-sidebar">
                Parking space occupancy detection using YOLO and multiple-view analysis
            </div>

            <nav class="nav-menu">
                <a href="/" class="nav-item active">
                    <i class="fas fa-desktop"></i> Single View Console
                </a>
            </nav>

            <div class="system-status">
                <div class="status-indicator">
                    <div class="pulse-dot"></div>
                    <span>AI LIVE</span>
                </div>
                <p id="system-model-label">YOLOv8s Engine - Active</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="model-selection-header">
                    <div class="selector-group">
                        <label for="ai-model-selector">Object Detection Model:</label>
                        <select id="ai-model-selector" class="model-dropdown">
                            <option value="yolo" selected>YOLOv8 (Recommended)</option>
                            <option value="ssd">SSD (Single Shot Detector)</option>
                        </select>
                    </div>
                </div>
                
                <div class="accuracy-showcase">
                    <div class="accuracy-metric">
                        <span class="label">Detection Accuracy:</span>
                        <span id="accuracy-value" class="value high">89%</span>
                    </div>
                    <div id="best-model-badge" class="best-model-tag">
                        <i class="fas fa-crown"></i> BEST MODEL
                    </div>
                </div>

                <div class="user-profile">
                    <div class="notifications"><i class="far fa-bell"></i><span class="badge"></span></div>
                    <div class="profile-info">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=4f46e5&color=fff" alt="User">
                        <span>System Admin</span>
                    </div>
                </div>
            </header>

            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="/static/script.js?v=1.0.2"></script>
</body>

</html>
